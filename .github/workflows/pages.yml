# 将 docs/ 目录发布到 GitHub Pages（自定义域名见 docs/CNAME）
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "scripts/check_docs_i18n.py"
      - "scripts/check-docs-i18n.sh"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "docs/**"
      - "scripts/check_docs_i18n.py"
      - "scripts/check-docs-i18n.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  check-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Chinese-md + bilingual HTML
        run: python3 scripts/check_docs_i18n.py

  deploy:
    needs: check-docs
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
