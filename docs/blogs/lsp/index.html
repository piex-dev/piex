<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0; url=/en/blogs/lsp/" />
  <link rel="canonical" href="https://piex.dev/en/blogs/lsp/" />
  <script>
    (function () {
      var kind = 'blogs';
      var slug = 'lsp';
      var lang = "en";
      try {
        var saved = localStorage.getItem("piex-lang");
        if (saved === "zh" || saved === "en") {
          lang = saved;
        } else {
          var nav = (navigator.languages && navigator.languages[0]) || navigator.language || "";
          if (/^zh\b/i.test(nav)) lang = "zh";
        }
      } catch (e) { }
      var target = "/" + lang + "/" + kind + "/" + slug + "/" + (location.hash || "");
      location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting to the localized page…</p>
  <p>
    <a href="/en/blogs/lsp/">English</a>
    ·
    <a href="/zh/blogs/lsp/">中文</a>
  </p>
</body>
</html>
